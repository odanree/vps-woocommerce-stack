# Netdata configuration — WooCommerce VPS
# /etc/netdata/netdata.conf

[global]
    run as user = netdata
    web files owner = root
    web files group = netdata
    # Bind to localhost only — access via SSH tunnel
    bind to = 127.0.0.1:19999

[web]
    bind to = 127.0.0.1:19999
    allow connections from = localhost 127.0.0.1

[plugins]
    # Enable key service plugins
    apps = yes
    charts.d = yes
    python.d = yes
    proc = yes
    idlejitter = yes
    # Disable unused plugins
    fping = no
    ioping = no
    nfacct = no

[plugin:proc]
    # Track network interface stats
    /proc/net/dev = yes
    /proc/diskstats = yes
    /proc/net/snmp = yes

# MySQL monitoring — configured by Ansible role (mysql.conf)
# Redis monitoring — auto-detected via localhost:6379
# Nginx monitoring — requires stub_status module (enabled in Nginx config)
# PHP-FPM monitoring — requires pm.status_path = /fpm-status

[db]
    # Keep 1 hour of per-second data, 24h of per-minute, 30d of per-hour
    update every = 1
    history = 3600

[health]
    enabled = yes
    # Alert if MySQL queries/s drops to 0 (service crash)
    # Alert if Redis hit rate < 50% (cache not warming)
    # Configured via /etc/netdata/health.d/
