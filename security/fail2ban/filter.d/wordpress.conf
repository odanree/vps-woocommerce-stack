# fail2ban filter for WordPress login and xmlrpc attacks
# /etc/fail2ban/filter.d/wordpress.conf
# Parses structured JSON access logs (see monitoring/nginx-access-log.conf)

[Definition]

# Match failed logins to wp-login.php
# Nginx returns 200 even on failed login (WordPress handles it); match by URI
failregex = ^.*"remote_addr":"<HOST>".*"request":"POST /wp-login\.php.*"status":"200".*"body_bytes_sent":"[^0]
            ^.*"remote_addr":"<HOST>".*"request":"POST /xmlrpc\.php.*"status":"(200|403)"

# Plain log format fallback (if not using JSON logging)
# failregex = ^<HOST> .* "POST /wp-login\.php
#             ^<HOST> .* "POST /xmlrpc\.php

ignoreregex =

[Init]
# For JSON logs, specify the date format in the log
datepattern = "time_local":"%d/%b/%Y:%H:%M:%S %z"
