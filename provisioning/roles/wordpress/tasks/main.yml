---
# ── WP-CLI ────────────────────────────────────────────────────────────────────

- name: Download WP-CLI
  get_url:
    url: https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
    dest: /usr/local/bin/wp
    mode: "0755"
    force: false  # skip if already downloaded

# ── WordPress core ────────────────────────────────────────────────────────────

- name: Check if WordPress is already downloaded
  stat:
    path: "/var/www/{{ server_domain }}/wp-includes/version.php"
  register: wp_version_file

- name: Download WordPress core
  command: >
    wp core download
    --path=/var/www/{{ server_domain }}
    --allow-root
  when: not wp_version_file.stat.exists
  become: true
  become_user: www-data

- name: Set web root ownership
  file:
    path: "/var/www/{{ server_domain }}"
    owner: www-data
    group: www-data
    recurse: true

# ── wp-config.php ─────────────────────────────────────────────────────────────

- name: Check if wp-config.php exists
  stat:
    path: "/var/www/{{ server_domain }}/wp-config.php"
  register: wp_config_file

- name: Create wp-config.php
  command: >
    wp config create
    --path=/var/www/{{ server_domain }}
    --dbname={{ wp_db_name }}
    --dbuser={{ wp_db_user }}
    --dbpass={{ wp_db_password }}
    --dbhost={{ wp_db_host }}
    --dbprefix={{ wp_table_prefix }}
    --extra-php
    --allow-root
  args:
    stdin: |
      define('WP_REDIS_HOST', '127.0.0.1');
      define('WP_REDIS_PORT', {{ redis_port }});
      define('WP_REDIS_SELECTIVE_FLUSH', true);
      define('WP_CACHE', true);
      define('DISALLOW_FILE_EDIT', true);
      define('WP_HOME', 'https://{{ server_domain }}');
      define('WP_SITEURL', 'https://{{ server_domain }}');
  when: not wp_config_file.stat.exists
  become: true
  become_user: www-data

# ── WordPress install ─────────────────────────────────────────────────────────

- name: Check if WordPress is already installed
  command: >
    wp core is-installed
    --path=/var/www/{{ server_domain }}
    --allow-root
  register: wp_installed
  failed_when: false
  changed_when: false

- name: Install WordPress
  command: >
    wp core install
    --path=/var/www/{{ server_domain }}
    --url=https://{{ server_domain }}
    --title="{{ wp_site_title }}"
    --admin_user={{ wp_admin_user }}
    --admin_password={{ wp_admin_password }}
    --admin_email={{ wp_admin_email }}
    --skip-email
    --allow-root
  when: wp_installed.rc != 0
  become: true
  become_user: www-data

# ── WooCommerce ───────────────────────────────────────────────────────────────

- name: Check if WooCommerce is installed
  command: >
    wp plugin is-installed woocommerce
    --path=/var/www/{{ server_domain }}
    --allow-root
  register: woo_installed
  failed_when: false
  changed_when: false

- name: Install and activate WooCommerce
  command: >
    wp plugin install woocommerce --activate
    --path=/var/www/{{ server_domain }}
    --allow-root
  when: woo_installed.rc != 0
  become: true
  become_user: www-data

# ── Redis object cache ─────────────────────────────────────────────────────────

- name: Check if Redis Cache plugin is installed
  command: >
    wp plugin is-installed redis-cache
    --path=/var/www/{{ server_domain }}
    --allow-root
  register: redis_plugin_installed
  failed_when: false
  changed_when: false

- name: Install Redis Cache plugin
  command: >
    wp plugin install redis-cache --activate
    --path=/var/www/{{ server_domain }}
    --allow-root
  when: redis_plugin_installed.rc != 0
  become: true
  become_user: www-data

- name: Enable Redis object cache
  command: >
    wp redis enable
    --path=/var/www/{{ server_domain }}
    --allow-root
  register: redis_enable
  changed_when: "'Success' in redis_enable.stdout"
  failed_when: false
  become: true
  become_user: www-data

# ── File permissions ───────────────────────────────────────────────────────────

- name: Set correct file permissions
  file:
    path: "/var/www/{{ server_domain }}"
    owner: www-data
    group: www-data
    recurse: true

- name: Harden wp-config.php permissions
  file:
    path: "/var/www/{{ server_domain }}/wp-config.php"
    mode: "0600"
