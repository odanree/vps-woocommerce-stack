---
- name: Install MySQL 8.0
  apt:
    name:
      - mysql-server
      - mysql-client
      - python3-pymysql
    state: present

- name: Start and enable MySQL
  systemd:
    name: mysql
    state: started
    enabled: true

- name: Install tuned my.cnf
  copy:
    src: "{{ playbook_dir }}/../mysql/my.cnf"
    dest: /etc/mysql/mysql.conf.d/woocommerce.cnf
    owner: root
    group: root
    mode: "0644"
  notify: Restart mysql

# Write .my.cnf BEFORE setting the password so re-runs can authenticate.
# First run: auth_socket is in effect, MySQL ignores the password in .my.cnf.
# Subsequent runs: root uses caching_sha2_password, module reads .my.cnf.
- name: Write /root/.my.cnf for passwordless root CLI access
  copy:
    content: |
      [client]
      user=root
      password={{ mysql_root_password }}
    dest: /root/.my.cnf
    owner: root
    group: root
    mode: "0600"

- name: Set MySQL root password
  mysql_user:
    name: root
    password: "{{ mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
    priv: "*.*:ALL,GRANT"
    state: present

- name: Remove anonymous MySQL users
  mysql_user:
    name: ""
    host_all: true
    state: absent
    login_user: root
    login_password: "{{ mysql_root_password }}"

- name: Remove remote root login
  mysql_user:
    name: root
    host: "{{ item }}"
    state: absent
    login_user: root
    login_password: "{{ mysql_root_password }}"
  loop:
    - "{{ ansible_hostname }}"
    - "127.0.0.1"
    - "::1"
    - "%"
  ignore_errors: true

- name: Remove test database
  mysql_db:
    name: test
    state: absent
    login_user: root
    login_password: "{{ mysql_root_password }}"

- name: Create WordPress database
  mysql_db:
    name: "{{ wp_db_name }}"
    state: present
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
    login_user: root
    login_password: "{{ mysql_root_password }}"

- name: Create WordPress DB user
  mysql_user:
    name: "{{ wp_db_user }}"
    password: "{{ wp_db_password }}"
    priv: "{{ wp_db_name }}.*:ALL"
    host: "{{ wp_db_host }}"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"

- name: Flush MySQL privileges
  command: mysql -u root -p{{ mysql_root_password }} -e "FLUSH PRIVILEGES;"
  changed_when: false
