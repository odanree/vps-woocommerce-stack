name: Lint

on:
  push:
  pull_request:

jobs:
  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML files
        run: yamllint -d relaxed provisioning/

  shellcheck:
    name: Shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck scripts/*.sh

  ansible-syntax:
    name: Ansible syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: pip install ansible ansible-lint
      - name: Create dummy inventory and vars
        run: |
          cp provisioning/inventory/hosts.example provisioning/inventory/hosts
          cp provisioning/group_vars/all.example.yml provisioning/group_vars/all.yml
      - name: Ansible syntax check
        run: |
          cd provisioning
          ansible-playbook --syntax-check -i inventory/hosts site.yml
