# Security response headers
# Include this in every HTTPS server block

# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Referrer policy — don't leak full URL to third-party payment processors
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions policy — restrict browser features not needed by WooCommerce
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;

# Content Security Policy — tighten after identifying all CDN/inline scripts
# Start permissive and harden after testing with report-only mode
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.stripe.com; frame-src https://js.stripe.com;" always;
