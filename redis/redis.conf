# Redis 7 — WooCommerce object cache configuration
# Managed by Ansible — placed at /etc/redis/redis.conf
# maxmemory is overridden from Ansible group_vars

# ─────────────────────────────────────────
# Network — localhost only; no password needed when bind-restricted
# ─────────────────────────────────────────
bind 127.0.0.1 ::1
port 6379
protected-mode yes

# ─────────────────────────────────────────
# Memory management
# ─────────────────────────────────────────
# Actual value set by Ansible from group_vars; this is the fallback default
maxmemory 256mb

# allkeys-lru: evict least-recently-used keys when memory is full.
# Correct policy for a pure cache — we never need persistence guarantees
# because WordPress can rebuild any cache value from the DB.
maxmemory-policy allkeys-lru

# Track 10 samples per LRU approximation — good balance of accuracy vs speed
maxmemory-samples 10

# ─────────────────────────────────────────
# Persistence — DISABLED for cache-only usage
# If Redis also stores PHP sessions, enable AOF for session durability.
# ─────────────────────────────────────────
save ""
appendonly no

# ─────────────────────────────────────────
# Performance
# ─────────────────────────────────────────
# TCP backlog for high-concurrency spikes (match /proc/sys/net/core/somaxconn)
tcp-backlog 511
tcp-keepalive 300

# WooCommerce object cache keys are typically < 10 KB
# Large client buffer cap prevents a single slow client from blocking others
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit pubsub 32mb 8mb 60

# Lazy freeing — async key deletion avoids latency spikes on large key evictions
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ─────────────────────────────────────────
# Logging
# ─────────────────────────────────────────
loglevel notice
logfile /var/log/redis/redis-server.log

# ─────────────────────────────────────────
# Database count
# ─────────────────────────────────────────
# WooCommerce uses DB 0 by default; PHP sessions use DB 1
databases 2
