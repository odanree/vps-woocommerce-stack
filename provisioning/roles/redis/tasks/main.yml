---
- name: Install Redis
  apt:
    name: redis-server
    state: present

- name: Install tuned redis.conf
  copy:
    src: "{{ playbook_dir }}/../redis/redis.conf"
    dest: /etc/redis/redis.conf
    owner: redis
    group: redis
    mode: "0640"
  notify: Restart redis

- name: Configure Redis maxmemory from group vars
  lineinfile:
    path: /etc/redis/redis.conf
    regexp: "^maxmemory "
    line: "maxmemory {{ redis_maxmemory }}"
  notify: Restart redis

- name: Ensure Redis is started and enabled
  systemd:
    name: redis-server
    state: started
    enabled: true
